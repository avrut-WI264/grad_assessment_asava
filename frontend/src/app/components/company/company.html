<div class="p-6 max-w-6xl mx-auto">
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-2xl font-bold text-slate-800">Company Management</h1>
    <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm font-medium">
      Total: {{companies.length}}
    </span>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-sm border border-slate-200 h-fit">
      <h2 class="text-lg font-semibold mb-4 text-slate-700">
        {{ isEditMode ? 'Update' : 'Add New' }} Company
      </h2>
      <form (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Short ID (Symbol)</label>
          <input [(ngModel)]="companyForm.shortId" name="shortId" [disabled]="isEditMode"
            class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-200 outline-none disabled:bg-slate-50">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Company Name</label>
          <input [(ngModel)]="companyForm.name" name="name"
            class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-200 outline-none">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Shares</label>
            <input [(ngModel)]="companyForm.noOfShare" name="noOfShare" type="number"
              class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-200 outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Current Price</label>
            <input [(ngModel)]="companyForm.currentPrice" name="currentPrice" type="number" step="0.01"
              class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-200 outline-none">
          </div>
        </div>
        <button type="submit" class="w-full py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition-colors">
          {{ isEditMode ? 'Update Company' : 'Register Company' }}
        </button>
        <button *ngIf="isEditMode" (click)="resetForm()" type="button" class="w-full text-sm text-slate-500 hover:underline">
          Cancel Edit
        </button>
      </form>
    </div>

    <div class="lg:col-span-2 overflow-hidden bg-white rounded-xl shadow-sm border border-slate-200">
      <table class="w-full text-left border-collapse">
        <thead class="bg-slate-50 border-b border-slate-200">
          <tr>
            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Symbol</th>
            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase">Name</th>
            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-right">Shares</th>
            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-right">Price</th>
            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase text-center">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">
          <tr *ngFor="let c of companies" class="hover:bg-slate-50 transition-colors">
            <td class="px-6 py-4 font-mono font-bold text-blue-600">{{c.shortId}}</td>
            <td class="px-6 py-4 text-slate-700">{{c.name}}</td>
            <td class="px-6 py-4 text-right text-slate-600">{{c.noOfShare | number}}</td>
            <td class="px-6 py-4 text-right font-semibold text-emerald-600">₹{{c.currentPrice | number:'1.2-2'}}</td>
            <td class="px-6 py-4 text-center space-x-2">
              <button (click)="editCompany(c)" class="p-2 text-amber-600 hover:bg-amber-50 rounded-lg">✏️</button>
              <button (click)="deleteCompany(c.shortId)" class="p-2 text-red-600 hover:bg-red-50 rounded-lg">❌</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
