<div class="flex min-h-screen items-center justify-center bg-[#0a0f1c] p-4">

  <div class="pointer-events-none fixed inset-0 bg-[url('data:image/svg+xml,%3Csvg%20width%3D%2240%22%20height%3D%2240%22%20viewBox%3D%220%200%2040%2040%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Cpath%20d%3D%22M0%200h40v40H0z%22%20fill%3D%22none%22%2F%3E%3Cpath%20d%3D%22M0%200h1v40H0zM0%200h40v1H0z%22%20fill%3D%22rgba(255%2C255%2C255%2C0.02)%22%2F%3E%3C%2Fsvg%3E')] opacity-60"></div>

  <div class="w-full max-w-md relative">

    <div class="flex flex-col items-center mb-8">
      <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center mb-4 shadow-lg shadow-blue-900/50">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/>
        </svg>
      </div>
      <h1 class="text-white text-2xl font-bold tracking-tight">ASAVA</h1>
      <p class="text-slate-500 text-sm mt-1">Sign in to your account</p>
    </div>

    <div class="bg-[#111827] border border-slate-800 rounded-2xl p-8 shadow-2xl shadow-black/40">

      <form (ngSubmit)="onLogin()" class="space-y-4" novalidate>

        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">
            Username or Email
          </label>
          <input
            [(ngModel)]="credentials.emailOrUsername"
            name="emailOrUsername"
            type="text"
            placeholder="you@example.com"
            required
            autocomplete="username"
            class="w-full bg-[#0a0f1c] border border-slate-800 rounded-xl px-4 py-3
                   text-white placeholder-slate-600 text-sm
                   focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500/30
                   transition-colors" />
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">
            Password
          </label>
          <input
            [(ngModel)]="credentials.password"
            name="password"
            type="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
            class="w-full bg-[#0a0f1c] border border-slate-800 rounded-xl px-4 py-3
                   text-white placeholder-slate-600 text-sm
                   focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500/30
                   transition-colors" />
        </div>

        <button
          type="submit"
          class="w-full mt-2 bg-blue-600 hover:bg-blue-500 active:scale-[0.98]
                 text-white font-semibold py-3 rounded-xl transition-all
                 shadow-lg shadow-blue-900/40 text-sm">
          Sign In
        </button>

      </form>

      <div class="flex items-center gap-3 my-6">
        <div class="flex-1 h-px bg-slate-800"></div>
        <span class="text-slate-600 text-xs">or</span>
        <div class="flex-1 h-px bg-slate-800"></div>
      </div>

      <p class="text-center text-sm text-slate-500">
        Don't have an account?
        <a routerLink="/register"
           class="text-blue-400 hover:text-blue-300 font-medium transition-colors ml-1">
          Create account
        </a>
      </p>

    </div>

    <p class="text-center text-xs text-slate-600 mt-6">
      Brought to you by team ASAVA!
    </p>

  </div>
</div>
