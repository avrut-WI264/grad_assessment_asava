<div class="flex min-h-screen bg-[#0a0f1c]">

  <!-- ─── Sidebar ─────────────────────────────────────────────────── -->
  <aside class="w-60 bg-[#111827] border-r border-slate-800 flex flex-col fixed h-full z-50">

    <!-- Brand -->
    <div class="px-5 py-5 border-b border-slate-800 flex items-center gap-3">
      <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-sm shrink-0">
        T
      </div>
      <div class="min-w-0">
        <p class="text-white font-bold text-sm leading-tight truncate">TradePro</p>
        <span class="inline-block text-[10px] bg-rose-500/15 text-rose-400 border border-rose-500/25
                     px-2 py-0.5 rounded-full font-semibold tracking-widest uppercase mt-0.5">
          Admin
        </span>
      </div>
    </div>

    <!-- User pill -->
    <div class="mx-3 mt-4 px-3 py-2.5 bg-slate-800/50 rounded-xl border border-slate-700/40 flex items-center gap-2.5">
      <div class="w-7 h-7 rounded-full bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center
                  text-white font-bold text-xs shrink-0">
        {{ user?.fullName?.charAt(0) || 'A' }}
      </div>
      <div class="min-w-0">
        <p class="text-white text-xs font-semibold truncate leading-tight">{{ user?.fullName || 'Admin' }}</p>
        <p class="text-slate-500 text-[10px] truncate">{{ user?.email || '' }}</p>
      </div>
    </div>

    <!-- Nav links -->
    <nav class="flex-1 px-3 py-4 space-y-0.5">

      <a routerLink="/admin/dashboard"
         routerLinkActive="!text-white bg-blue-600/15 border-blue-500/25"
         [routerLinkActiveOptions]="{ exact: true }"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400
                hover:text-white hover:bg-slate-800 border border-transparent
                transition-all text-sm font-medium group">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Dashboard
      </a>

      <a routerLink="/admin/companies"
         routerLinkActive="!text-white bg-blue-600/15 border-blue-500/25"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400
                hover:text-white hover:bg-slate-800 border border-transparent
                transition-all text-sm font-medium">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
        </svg>
        Companies
      </a>

      <a routerLink="/admin/companies/add"
         routerLinkActive="!text-white bg-blue-600/15 border-blue-500/25"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400
                hover:text-white hover:bg-slate-800 border border-transparent
                transition-all text-sm font-medium">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 4v16m8-8H4"/>
        </svg>
        Add Company
      </a>

    </nav>

    <!-- Logout -->
    <div class="px-3 pb-4 border-t border-slate-800 pt-3">
      <button (click)="logout()"
        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-rose-400
               hover:bg-rose-500/10 border border-transparent hover:border-rose-500/20
               transition-all text-sm font-medium">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Logout
      </button>
    </div>
  </aside>

  <!-- ─── Main content ──────────────────────────────────────────────── -->
  <main class="ml-60 flex-1 min-h-screen overflow-y-auto">
    <router-outlet></router-outlet>
  </main>

</div>
