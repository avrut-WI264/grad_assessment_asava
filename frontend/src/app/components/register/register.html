<div class="flex min-h-screen items-center justify-center bg-slate-50 p-4">
  <div class="w-full max-w-lg rounded-2xl bg-white p-8 shadow-xl ring-1 ring-slate-200">
    <h2 class="text-center text-3xl font-bold text-slate-900">Create Account</h2>
    <form (ngSubmit)="onRegister()" class="mt-8 grid grid-cols-1 gap-4">
      <input [(ngModel)]="user.fullName" name="fullName" placeholder="Full Name" class="rounded-lg border border-slate-300 px-4 py-2 outline-none focus:ring-2 focus:ring-blue-200">
      <div class="grid grid-cols-2 gap-4">
        <input [(ngModel)]="user.username" name="username" placeholder="Username" class="rounded-lg border border-slate-300 px-4 py-2 outline-none focus:ring-2 focus:ring-blue-200">
        <input [(ngModel)]="user.phoneNumber" name="phoneNumber" placeholder="Phone" class="rounded-lg border border-slate-300 px-4 py-2 outline-none focus:ring-2 focus:ring-blue-200">
      </div>
      <input [(ngModel)]="user.email" name="email" type="email" placeholder="Email" class="rounded-lg border border-slate-300 px-4 py-2 outline-none focus:ring-2 focus:ring-blue-200">
      <input [(ngModel)]="user.password" name="password" type="password" placeholder="Password" class="rounded-lg border border-slate-300 px-4 py-2 outline-none focus:ring-2 focus:ring-blue-200">
      
      <button type="submit" class="mt-4 w-full rounded-lg bg-emerald-600 py-3 font-semibold text-white hover:bg-emerald-700 transition-all">
        Register Now
      </button>
    </form>
    <p class="mt-6 text-center text-sm text-slate-600">
      Already have an account? <a routerLink="/login" class="font-medium text-blue-600 hover:underline">Login</a>
    </p>
  </div>
</div>
