<div class="grid grid-cols-1 xl:grid-cols-4 gap-6">

    <div class="xl:col-span-3 space-y-6">
        <div class="bg-[#111827] border border-slate-800 rounded-2xl p-6 min-h-[500px] flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-4">
                    <span class="text-2xl font-bold text-white">{{order.companyId}} / INR</span>
                    <span class="text-emerald-400 font-mono text-xl">INR {{currentPrice}}</span>
                </div>
                <div class="flex gap-2">
                    <button (click)="setTimeframe('1H')"
                        [class]="selectedTimeframe === '1H' ? 'bg-blue-600 text-white ring-1 ring-white' : 'bg-slate-800 text-slate-400'"
                        class="px-3 py-1 rounded text-xs font-medium transition-all active:scale-95">
                        1H
                    </button>

                    <button (click)="setTimeframe('4H')"
                        [class]="selectedTimeframe === '4H' ? 'bg-blue-600 text-white ring-1 ring-white' : 'bg-slate-800 text-slate-400'"
                        class="px-3 py-1 rounded text-xs font-medium transition-all active:scale-95">
                        4H
                    </button>

                    <button (click)="setTimeframe('1D')"
                        [class]="selectedTimeframe === '1D' ? 'bg-blue-600 text-white ring-1 ring-white' : 'bg-slate-800 text-slate-400'"
                        class="px-3 py-1 rounded text-xs font-medium transition-all active:scale-95">
                        1D
                    </button>
                </div>
            </div>

            <div class="flex-grow flex items-end gap-1 px-2">
                <div *ngFor="let i of [40,60,45,70,85,60,75,90,55,70]" [style.height.%]="i"
                    class="flex-grow bg-gradient-to-t from-blue-600/20 to-blue-500/50 rounded-t-sm border-t border-blue-400">
                </div>
            </div>
        </div>
    </div>

    <div class="space-y-6">
        <div class="bg-[#111827] border border-slate-800 rounded-2xl p-6">
            <div class="flex p-1 bg-[#0a0f1c] rounded-lg mb-6">
                <button (click)="order.type = 'BUY'"
                    [class]="order.type === 'BUY' ? 'bg-emerald-600 text-white' : 'text-slate-400'"
                    class="flex-1 py-2 rounded-md font-bold transition-all">BUY</button>
                <button (click)="order.type = 'SELL'"
                    [class]="order.type === 'SELL' ? 'bg-rose-600 text-white' : 'text-slate-400'"
                    class="flex-1 py-2 rounded-md font-bold transition-all">SELL</button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-xs text-slate-500 uppercase font-bold mb-1 block">Price (USDT)</label>
                    <input [(ngModel)]="order.price" type="number"
                        class="w-full bg-[#0a0f1c] border border-slate-800 rounded-xl px-4 py-3 text-white focus:border-blue-500 outline-none">
                    <p class="text-[10px] mt-1 text-slate-500 italic">Max deviation allowed: 5% (INR{{(currentPrice *
                        0.05).toFixed(2)}})</p>
                </div>

                <div>
                    <label class="text-xs text-slate-500 uppercase font-bold mb-1 block">Quantity</label>
                    <input [(ngModel)]="order.quantity" type="number"
                        class="w-full bg-[#0a0f1c] border border-slate-800 rounded-xl px-4 py-3 text-white focus:border-blue-500 outline-none">
                </div>

                <div class="pt-4">
                    <div class="flex justify-between text-sm mb-2">
                        <span class="text-slate-500">Total</span>
                        <span class="text-white font-bold">INR{{(order.price * order.quantity).toFixed(2)}}</span>
                    </div>
                    <button (click)="submitOrder()"
                        [class]="order.type === 'BUY' ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-rose-600 hover:bg-rose-700'"
                        class="w-full py-4 rounded-xl text-white font-bold shadow-lg transition-all active:scale-95">
                        Place {{order.type}} Order
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
