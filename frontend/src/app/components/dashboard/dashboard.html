<div class="space-y-8">
  <div>
    <h1 class="text-3xl font-bold text-white">Portfolio Overview</h1>
    <p class="text-slate-400 mt-1">Track your investments and explore market opportunities</p>
  </div>

  <div *ngIf="!isLoading; else loading">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
      <div *ngFor="let stat of stats"
        class="bg-[#111827] border border-slate-800 p-6 rounded-2xl hover:border-slate-700 transition-all">
        <div class="flex justify-between items-start mb-4">
          <span class="text-slate-400 font-medium">{{stat.label}}</span>
          <span [class]="stat.color">{{stat.icon}}</span>
        </div>
        <div class="text-2xl font-bold text-white mb-1">{{stat.value}}</div>
        <div class="text-sm" [class]="stat.color">{{stat.sub}}</div>
      </div>
    </div>
  </div>

  <ng-template #loading>
    <div class="text-white">Loading...</div>
  </ng-template>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <div class="lg:col-span-2 bg-[#111827] border border-slate-800 rounded-2xl p-6">
      <h2 class="text-xl font-bold text-white mb-6">Market Overview</h2>
      <div class="space-y-4">
        <div *ngFor="let item of marketData || []"
          class="flex items-center justify-between p-4 bg-[#0a0f1c] rounded-xl border border-slate-900">
          <div class="flex items-center gap-4">
            <div [class]="item.color"
              class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-white">
              {{item.symbol?.[0]}}
            </div>
            <div>
              <div class="font-bold text-white">{{item.symbol}}</div>
              <div class="text-xs text-slate-500">{{item.name}}</div>
            </div>
          </div>
          <div class="text-right">
            <div class="font-bold text-white">{{item.price}}</div>
            <div class="text-xs" [class]="item.change?.startsWith('+') ? 'text-emerald-400' : 'text-rose-400'">
              {{item.change}}
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="bg-[#111827] border border-slate-800 rounded-2xl p-6">
      <h2 class="text-xl font-bold text-white mb-6">Asset Allocation</h2>
      <div class="aspect-square rounded-full border-8 border-slate-800 flex items-center justify-center relative">
        <div class="text-center">
          <div class="text-3xl font-bold text-white">72%</div>
          <div class="text-xs text-slate-500 uppercase tracking-widest">Crypto</div>
        </div>
      </div>
    </div>
  </div>
</div>
