name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Backend
        run: |
          cd backend
          mvn clean install

      - name: Install Frontend
        run: |
          cd frontend
          npm install

      - name: Run SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=avrut-WI264_grad_assessment_asava
            -Dsonar.organization=avrut-wi264
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}